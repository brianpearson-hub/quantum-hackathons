name: Build llms.txt

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'scripts/build-llms.js'
      - '.github/workflows/build-llms.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate llms.txt and llms-full.txt
        run: node scripts/build-llms.js

      - name: Commit updated files if changed
        run: |
          if [[ -n "$(git status --porcelain llms.txt llms-full.txt)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add llms.txt llms-full.txt
            git commit -m "Auto-regenerate llms.txt from HACKATHONS data"
            git push
          else
            echo "No changes to llms.txt"
          fi
